<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>活動議程 | TPR 2026 @ NTOU</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { 'ocean-deep':'#0c4a6e','ocean-blue':'#0369a1','ocean-cyan':'#0891b2','ocean-teal':'#0d9488','sand':'#fbbf24','coral':'#fb923c' },
    fontFamily: { sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'] }
  }}}
</script>
<link rel="stylesheet" href="../assets/css/style.css" />
<style>[x-cloak]{display:none!important}</style>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
<script defer src="../assets/js/main.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body data-depth="1" x-data="agendaData()" x-cloak>

<!-- ============ NAVBAR ============ -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md transition-all duration-200">
  <div class="max-w-7xl mx-auto px-5 sm:px-8">
    <div class="flex items-center justify-between h-16 sm:h-18">
      <a href="../" class="flex items-center gap-2.5 group">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-ocean-cyan to-ocean-teal flex items-center justify-center shadow-md group-hover:scale-105 transition">
          <i data-lucide="waves" class="w-5 h-5 text-white"></i>
        </div>
        <div class="leading-tight">
          <div class="text-[11px] text-slate-500 font-medium tracking-wider">智慧導引心航道 · <span x-text="event.date"></span></div>
          <div class="text-sm font-bold text-ocean-deep" x-text="event.title_suffix"></div>
        </div>
      </a>
      <div class="hidden lg:flex items-center gap-8">
        <a href="../" class="nav-link">首頁</a>
        <a href="../agenda/" class="nav-link active">議程</a>
        <a href="../field-trip/" class="nav-link">場域踏查</a>
        <a href="../transport/" class="nav-link">交通資訊</a>
        <a href="../contact/" class="nav-link">聯繫我們</a>
      </div>
      <div class="flex items-center gap-3">
        <a :href="event.register_url || '../#register'" class="hidden sm:inline-flex btn btn-primary text-sm py-2.5 px-5">
          <i data-lucide="edit-3" class="w-4 h-4"></i> 立即報名
        </a>
        <button id="menuBtn" class="lg:hidden w-10 h-10 rounded-lg flex items-center justify-center hover:bg-slate-100">
          <i data-lucide="menu" class="w-6 h-6 text-ocean-deep"></i>
        </button>
      </div>
    </div>
    <div id="mobileMenu" class="hidden lg:hidden pb-4 border-t border-slate-100">
      <div class="flex flex-col gap-1 pt-3">
        <a href="../" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">首頁</a>
        <a href="../agenda/" class="px-3 py-2.5 rounded-lg text-ocean-deep font-semibold bg-sky-50">議程</a>
        <a href="../field-trip/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">場域踏查</a>
        <a href="../transport/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">交通資訊</a>
        <a href="../contact/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">聯繫我們</a>
        <a :href="event.register_url || '../#register'" class="mt-2 btn btn-primary justify-center py-2.5">立即報名</a>
      </div>
    </div>
  </div>
</nav>

<!-- ============ PAGE HERO ============ -->
<section class="page-hero-gradient relative overflow-hidden pt-32 sm:pt-36 pb-20">
  <div class="absolute inset-0 dot-pattern opacity-30"></div>
  <div class="absolute -top-20 -right-32 w-96 h-96 rounded-full bg-cyan-400/20 blur-3xl"></div>
  <div class="relative max-w-7xl mx-auto px-5 sm:px-8">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/15 backdrop-blur border border-white/30 text-white text-sm font-medium mb-5 fade-up">
      <i data-lucide="calendar-days" class="w-4 h-4"></i>
      Agenda · 活動議程
    </div>
    <h1 class="fade-up text-white font-black tracking-tight text-4xl sm:text-5xl lg:text-6xl mb-4" x-text="page.page_title"></h1>
    <p class="fade-up text-cyan-100/90 text-base sm:text-lg max-w-2xl" x-html="md(page.page_description)"></p>
  </div>
  <div class="wave-divider absolute bottom-0 left-0 right-0">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path fill="#f8fafc" d="M0,32 C240,80 480,80 720,48 C960,16 1200,16 1440,48 L1440,80 L0,80 Z"></path>
    </svg>
  </div>
</section>

<!-- ============ DAY NAV ============ -->
<section class="pt-6 pb-2" x-show="groupSessionsByDay(page.sessions).length > 1">
  <div class="max-w-5xl mx-auto px-5 sm:px-8">
    <div class="flex flex-wrap gap-2 justify-center">
      <template x-for="(d, di) in groupSessionsByDay(page.sessions)" :key="di">
        <a :href="'#day-' + (di + 1)"
           class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-slate-200 hover:border-ocean-cyan hover:bg-sky-50 text-sm font-bold text-ocean-deep transition shadow-sm">
          <i :data-lucide="d.header?.icon || 'calendar'" class="w-4 h-4 text-ocean-cyan"></i>
          <span x-text="d.header?.tag || ('Day ' + (di + 1))"></span>
          <span class="text-slate-400 font-normal" x-text="d.header?.time"></span>
        </a>
      </template>
    </div>
  </div>
</section>

<!-- ============ TIMELINE ============ -->
<section class="py-8 sm:py-12">
  <div class="max-w-5xl mx-auto px-5 sm:px-8 space-y-8">

    <template x-for="(day, di) in groupSessionsByDay(page.sessions)" :key="di">
      <div class="card !p-0 fade-up overflow-hidden" :id="'day-' + (di + 1)">

        <!-- 日期橫幅 -->
        <div class="bg-gradient-to-r from-ocean-cyan via-ocean-blue to-ocean-teal text-white px-6 sm:px-10 py-6 flex items-center gap-4 flex-wrap"
             x-show="day.header">
          <div class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center shrink-0 ring-1 ring-white/30">
            <i :data-lucide="day.header?.icon || 'calendar'" class="w-7 h-7 text-white"></i>
          </div>
          <div class="flex-1 min-w-[200px]">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs font-bold uppercase tracking-widest bg-white/20 px-2.5 py-1 rounded-full backdrop-blur" x-text="day.header?.tag"></span>
              <span class="text-sm text-cyan-50/90 font-medium" x-text="day.header?.time"></span>
            </div>
            <div class="font-black text-xl sm:text-2xl leading-tight" x-text="day.header?.title"></div>
          </div>
        </div>

        <!-- 該日議程 -->
        <div class="p-6 sm:p-10">
          <template x-for="(s, i) in day.sessions" :key="i">
            <div class="timeline-row">
              <div class="timeline-time" x-text="s.time"></div>
              <div>

            <!-- 平行場次 -->
            <template x-if="s.groups && s.groups.length">
              <div class="space-y-4">
                <div class="flex items-center gap-2 mb-1" x-show="s.headline">
                  <i data-lucide="git-branch" class="w-4 h-4 text-ocean-cyan"></i>
                  <span class="text-xs font-bold text-ocean-cyan uppercase tracking-wider" x-text="s.headline"></span>
                </div>

                <template x-for="(g, gi) in s.groups" :key="gi">
                  <div>
                    <div class="flex items-center gap-2 mb-2">
                      <span :class="tagClass(g.category_color)" x-text="g.category_label"></span>
                    </div>
                    <div :class="gridCols(g.tracks.length)">
                      <template x-for="(t, ti) in g.tracks" :key="ti">
                        <div class="track-box">
                          <span class="track-label bg-sky-100 text-sky-800" x-text="t.label"></span>
                          <h4 class="font-bold text-ocean-deep text-sm" x-text="t.title"></h4>
                          <p class="text-slate-500 text-xs mt-1.5 flex items-center gap-1.5">
                            <i data-lucide="map-pin" class="w-3 h-3"></i>
                            <span x-text="t.location"></span>
                          </p>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>

                <!-- 場域踏查嵌入卡片 -->
                <template x-if="s.field_trip_card">
                  <div>
                    <div class="flex items-center gap-2 mb-2">
                      <span class="tag tag-coral">USR 場域踏查</span>
                      <span class="text-xs text-slate-500" x-text="s.field_trip_note"></span>
                    </div>
                    <div class="track-box bg-gradient-to-br from-orange-50 to-amber-50 border-orange-100">
                      <div class="grid sm:grid-cols-2 gap-3">
                        <div class="flex items-start gap-3">
                          <div class="w-9 h-9 rounded-lg bg-orange-100 flex items-center justify-center shrink-0">
                            <i data-lucide="ship" class="w-4 h-4 text-orange-700"></i>
                          </div>
                          <div>
                            <div class="text-xs font-bold text-orange-700 uppercase tracking-wider">路線一</div>
                            <div class="font-bold text-ocean-deep">和平島</div>
                          </div>
                        </div>
                        <div class="flex items-start gap-3">
                          <div class="w-9 h-9 rounded-lg bg-amber-100 flex items-center justify-center shrink-0">
                            <i data-lucide="anchor" class="w-4 h-4 text-amber-700"></i>
                          </div>
                          <div>
                            <div class="text-xs font-bold text-amber-700 uppercase tracking-wider">路線二</div>
                            <div class="font-bold text-ocean-deep">八斗子</div>
                          </div>
                        </div>
                      </div>
                      <p class="text-slate-500 text-xs mt-3 flex items-center gap-1.5 pt-3 border-t border-orange-100">
                        <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                        集合地點：展示廳門口
                        <a href="../field-trip/" class="ml-auto text-coral font-semibold inline-flex items-center gap-1 hover:gap-2 transition-all">
                          路線詳情 <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </a>
                      </p>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- 主題演講（特殊區塊） -->
            <template x-if="s.is_keynote">
              <div class="flex items-start gap-3">
                <span class="tag tag-sand shrink-0 mt-1" x-text="s.tag"></span>
                <div>
                  <h3 class="font-bold text-ocean-deep text-lg">
                    【<span x-text="page.keynote_topic"></span>】
                  </h3>
                  <p class="text-slate-600 text-sm mt-2 inline-flex items-center gap-1.5 bg-amber-50 px-3 py-1.5 rounded-lg">
                    <i data-lucide="user" class="w-4 h-4 text-amber-600"></i>
                    <span><strong>主講人：</strong><span x-text="page.keynote_speaker_name"></span>　<span x-text="page.keynote_speaker_title"></span></span>
                  </p>
                </div>
              </div>
            </template>

            <!-- 一般時段 -->
            <template x-if="!s.groups && !s.is_keynote">
              <div class="flex items-start gap-3">
                <span class="tag tag-sand shrink-0 mt-1" x-show="s.tag" x-text="s.tag"></span>
                <div>
                  <h3 class="font-bold text-ocean-deep text-lg flex items-center gap-2">
                    <i :data-lucide="s.icon" class="w-5 h-5" x-show="s.icon"></i>
                    <span x-text="s.title"></span>
                  </h3>
                  <p class="text-slate-500 text-sm mt-1 flex items-center gap-1.5" x-show="s.location">
                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                    <span x-text="s.location"></span>
                  </p>
                  <div class="text-slate-600 text-sm mt-1" x-show="s.subtitle" x-html="md(s.subtitle)"></div>
                </div>
              </div>
            </template>

          </div>
        </div>
      </template>

        </div><!-- /day-body -->
      </div><!-- /day-card -->
    </template>

    <!-- 提醒卡片 -->
    <div class="grid sm:grid-cols-2 gap-4 mt-8">
      <template x-for="(n, i) in (page.notes || [])" :key="i">
        <div class="card fade-up !p-5 flex gap-4 border-l-4"
             :class="'!border-l-' + (n.color || 'ocean-cyan')">
          <i data-lucide="info" class="w-6 h-6 shrink-0"
             :class="'text-' + (n.color || 'ocean-cyan')"></i>
          <div class="text-sm">
            <div class="font-bold text-ocean-deep mb-1" x-text="n.title"></div>
            <div class="text-slate-600 leading-relaxed" x-html="md(n.content)"></div>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>

<!-- ============ FOOTER ============ -->
<footer class="footer-bg text-white pt-16 pb-8 mt-12">
  <div class="max-w-7xl mx-auto px-5 sm:px-8">
    <div class="grid md:grid-cols-3 gap-10 pb-12 border-b border-white/10">
      <div>
        <div class="flex items-center gap-2.5 mb-4">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-ocean-cyan to-ocean-teal flex items-center justify-center">
            <i data-lucide="waves" class="w-5 h-5 text-white"></i>
          </div>
          <div class="font-bold">
            <span x-text="event.title_main"></span><span x-text="event.title_suffix"></span>
          </div>
        </div>
        <p class="text-cyan-100/70 text-sm leading-relaxed">
          <span x-text="event.organizer_tag"></span><br />
          <span x-text="event.title_part1"></span> 暨 <span x-text="event.title_part2"></span>
        </p>
      </div>
      <div>
        <h4 class="font-bold mb-4 text-amber-200">快速連結</h4>
        <ul class="space-y-2.5 text-cyan-100/80 text-sm">
          <li><a href="../agenda/" class="hover:text-white transition">活動議程</a></li>
          <li><a href="../field-trip/" class="hover:text-white transition">場域踏查路線</a></li>
          <li><a href="../transport/" class="hover:text-white transition">交通與地圖</a></li>
          <li><a href="../contact/" class="hover:text-white transition">聯繫我們</a></li>
        </ul>
      </div>
      <div>
        <h4 class="font-bold mb-4 text-amber-200">聯絡資訊</h4>
        <ul class="space-y-2.5 text-cyan-100/80 text-sm">
          <li class="flex items-start gap-2"><i data-lucide="building-2" class="w-4 h-4 mt-0.5 shrink-0"></i><span x-html="md(event.footer?.org_name)"></span></li>
        </ul>
      </div>
    </div>
    <div class="pt-6 text-center text-cyan-100/50 text-xs">
      © 2026 臺北聯合大學系統 · 教學實踐研究北區基地 &amp; 國立臺灣海洋大學
    </div>
  </div>
</footer>

</body>
</html>
