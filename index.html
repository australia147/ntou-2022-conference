<!DOCTYPE html>

<meta charset="UTF-8" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'ocean-deep': '#0c4a6e',
          'ocean-blue': '#0369a1',
          'ocean-cyan': '#0891b2',
          'ocean-teal': '#0d9488',
          'sand': '#fbbf24',
          'coral': '#fb923c',
        },
        fontFamily: { sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'] }
      }

  }
</script>
<link rel="stylesheet" href="assets/css/style.css" />

<body data-depth="0" x-data="homeData()" x-effect="if (event.title_part1 || event.title_part2) document.title = (event.title_part1 || '') + (event.title_part2 || '')" x-cloak>

        <div class="leading-tight">

      </div>
    </div>

    <div id="mobileMenu" class="hidden lg:hidden pb-4 border-t border-slate-100">
      <div class="flex flex-col gap-1 pt-3">
        <a href="./" class="px-3 py-2.5 rounded-lg text-ocean-deep font-semibold bg-sky-50">首頁</a>
        <a href="agenda/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">議程</a>

        <a href="transport/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">交通資訊</a>

<!-- ============ HERO ============ -->
<section class="hero-gradient relative overflow-hidden pt-32 sm:pt-40 pb-32">
  <div class="absolute inset-0 dot-pattern opacity-30"></div>
  <div class="absolute -top-20 -right-32 w-96 h-96 rounded-full bg-cyan-400/20 blur-3xl"></div>
  <div class="absolute -bottom-32 -left-20 w-96 h-96 rounded-full bg-teal-400/20 blur-3xl"></div>

  <div class="relative max-w-7xl mx-auto px-5 sm:px-8">
    <div class="max-w-4xl">
      <h1 class="fade-up text-white font-black tracking-tight leading-[1.1] text-4xl sm:text-5xl lg:text-6xl xl:text-7xl mb-6">
        <span x-text="event.title_main"></span><br />
        <span class="bg-gradient-to-r from-amber-300 to-orange-300 bg-clip-text text-transparent" x-text="event.title_part1"></span><br />
        <span class="bg-gradient-to-r from-cyan-200 to-teal-200 bg-clip-text text-transparent" x-text="event.title_part2"></span><br />
        <span x-text="event.title_suffix"></span>
      </h1>

      <p class="fade-up text-cyan-100/90 text-lg sm:text-xl mb-10 max-w-2xl leading-relaxed" x-html="md(event.tagline)"></p>

      <!-- key info row -->
      <div class="fade-up grid sm:grid-cols-3 gap-4 mb-10 max-w-3xl">
        <div class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-white/10 backdrop-blur border border-white/20">
          <div class="w-11 h-11 rounded-xl bg-amber-400/30 flex items-center justify-center">
            <i data-lucide="calendar" class="w-5 h-5 text-amber-200"></i>
          </div>
          <div>
            <div class="text-[11px] text-cyan-100/70 uppercase tracking-wider">日期</div>
            <div class="text-white font-bold" x-text="event.date"></div>
            <div class="text-cyan-100/80 text-xs" x-text="event.date_note"></div>
          </div>
        </div>
        <div class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-white/10 backdrop-blur border border-white/20">
          <div class="w-11 h-11 rounded-xl bg-cyan-400/30 flex items-center justify-center">
            <i data-lucide="clock" class="w-5 h-5 text-cyan-200"></i>
          </div>
          <div>
            <div class="text-[11px] text-cyan-100/70 uppercase tracking-wider">時間</div>
            <div class="text-white font-bold">
              <span x-text="event.time_start"></span>–<span x-text="event.time_end"></span>
            </div>
            <div class="text-cyan-100/80 text-xs">全日活動</div>
          </div>
        </div>
        <div class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-white/10 backdrop-blur border border-white/20">
          <div class="w-11 h-11 rounded-xl bg-teal-400/30 flex items-center justify-center">
            <i data-lucide="map-pin" class="w-5 h-5 text-teal-200"></i>
          </div>
          <div>
            <div class="text-[11px] text-cyan-100/70 uppercase tracking-wider">地點</div>
            <div class="text-white font-bold" x-text="event.location"></div>
            <div class="text-cyan-100/80 text-xs" x-text="event.location_short"></div>
          </div>
        </div>
      </div>

      <div class="fade-up flex flex-wrap gap-4">
        <a :href="event.register_url || '#register'" class="btn btn-primary">
          <i data-lucide="edit-3" class="w-5 h-5"></i>
          立即報名

        <a href="agenda/" class="btn btn-ghost">
          <i data-lucide="calendar-days" class="w-5 h-5"></i>
          查看議程
        </a>
      </div>
    </div>
  </div>

  <div class="wave-divider absolute bottom-0 left-0 right-0">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path fill="#f8fafc" d="M0,32 C240,80 480,80 720,48 C960,16 1200,16 1440,48 L1440,80 L0,80 Z"></path>
    </svg>
  </div>
</section>

<!-- ============ ABOUT ============ -->
<section class="py-20 sm:py-28">
  <div class="max-w-7xl mx-auto px-5 sm:px-8">
    <div class="grid lg:grid-cols-12 gap-12 items-start">
      <div class="lg:col-span-5 fade-up">
        <span class="tag tag-ocean mb-4" x-text="page.about?.tag"></span>
        <h2 class="section-title">
          <span x-text="page.about?.title_line1"></span><br />
          <span x-text="page.about?.title_line2"></span>
        </h2>
        <p class="text-slate-600 leading-loose mb-6" x-html="md(page.about?.intro)"></p>
        <ul class="space-y-3 text-slate-700">
          <template x-for="(b, i) in (page.about?.bullets || [])" :key="i">
            <li class="flex gap-3">
              <i data-lucide="check-circle-2" class="w-5 h-5 text-ocean-cyan shrink-0 mt-0.5"></i>
              <span x-html="md(b.text)"></span>
            </li>
          </template>
        </ul>
      </div>

      <div class="lg:col-span-7 grid sm:grid-cols-2 gap-5">
        <template x-for="(card, i) in (page.cards || [])" :key="i">
          <a :href="card.link_url" class="card fade-up group">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br flex items-center justify-center mb-5 shadow-lg"
                 :class="[cardStyle(i).gradient, cardStyle(i).shadow]">
              <i :data-lucide="cardStyle(i).icon" class="w-6 h-6 text-white"></i>
            </div>
            <h3 class="text-lg font-bold text-ocean-deep mb-2" x-text="card.title"></h3>
            <p class="text-slate-500 text-sm leading-relaxed mb-4" x-html="md(card.description)"></p>
            <span class="font-semibold text-sm inline-flex items-center gap-1 group-hover:gap-2 transition-all"
                  :class="cardStyle(i).link">
              <span x-text="card.link_text"></span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </span>
          </a>
        </template>
      </div>
    </div>
  </div>
</section>

<!-- ============ HIGHLIGHT STATS ============ -->
<section class="py-16 sm:py-20 bg-gradient-to-br from-sky-50 via-white to-cyan-50">
  <div class="max-w-7xl mx-auto px-5 sm:px-8">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">
      <template x-for="(s, i) in (page.stats || [])" :key="i">
        <div class="text-center fade-up">
          <div class="text-5xl sm:text-6xl font-black bg-gradient-to-br bg-clip-text text-transparent mb-2"
               :class="statGradient(i)" x-text="s.number"></div>
          <div class="text-slate-600 font-semibold" x-text="s.label"></div>
          <div class="text-slate-400 text-xs mt-1" x-text="s.sublabel"></div>
        </div>
      </template>
    </div>
  </div>
</section>

      <div class="relative grid lg:grid-cols-3 gap-8 items-center">

        <div class="flex flex-col gap-3">

            <i data-lucide="calendar-days" class="w-5 h-5"></i>
            先看完整議程
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
