<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>USR 場域踏查 | TPR 2026 @ NTOU</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { 'ocean-deep':'#0c4a6e','ocean-blue':'#0369a1','ocean-cyan':'#0891b2','ocean-teal':'#0d9488','sand':'#fbbf24','coral':'#fb923c' },
    fontFamily: { sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'] }
  }}}
</script>
<link rel="stylesheet" href="../assets/css/style.css" />
<style>[x-cloak]{display:none!important}</style>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
<script defer src="../assets/js/main.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body data-depth="1" x-data="fieldTripData()" x-cloak>

<!-- ============ NAVBAR ============ -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md transition-all duration-200">
  <div class="max-w-7xl mx-auto px-5 sm:px-8">
    <div class="flex items-center justify-between h-16 sm:h-18">
      <a href="../" class="flex items-center gap-2.5 group">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-ocean-cyan to-ocean-teal flex items-center justify-center shadow-md group-hover:scale-105 transition">
          <i data-lucide="waves" class="w-5 h-5 text-white"></i>
        </div>
        <div class="leading-tight">
          <div class="text-[11px] text-slate-500 font-medium tracking-wider">NTOU · <span x-text="event.date"></span></div>
          <div class="text-sm font-bold text-ocean-deep" x-text="event.title_suffix"></div>
        </div>
      </a>
      <div class="hidden lg:flex items-center gap-8">
        <a href="../" class="nav-link">首頁</a>
        <a href="../agenda/" class="nav-link">議程</a>
        <a href="../field-trip/" class="nav-link active">場域踏查</a>
        <a href="../transport/" class="nav-link">交通資訊</a>
        <a href="../contact/" class="nav-link">聯繫我們</a>
      </div>
      <div class="flex items-center gap-3">
        <a :href="event.register_url || '../#register'" class="hidden sm:inline-flex btn btn-primary text-sm py-2.5 px-5">
          <i data-lucide="edit-3" class="w-4 h-4"></i> 立即報名
        </a>
        <button id="menuBtn" class="lg:hidden w-10 h-10 rounded-lg flex items-center justify-center hover:bg-slate-100">
          <i data-lucide="menu" class="w-6 h-6 text-ocean-deep"></i>
        </button>
      </div>
    </div>
    <div id="mobileMenu" class="hidden lg:hidden pb-4 border-t border-slate-100">
      <div class="flex flex-col gap-1 pt-3">
        <a href="../" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">首頁</a>
        <a href="../agenda/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">議程</a>
        <a href="../field-trip/" class="px-3 py-2.5 rounded-lg text-ocean-deep font-semibold bg-sky-50">場域踏查</a>
        <a href="../transport/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">交通資訊</a>
        <a href="../contact/" class="px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">聯繫我們</a>
        <a :href="event.register_url || '../#register'" class="mt-2 btn btn-primary justify-center py-2.5">立即報名</a>
      </div>
    </div>
  </div>
</nav>

<!-- ============ PAGE HERO ============ -->
<section class="page-hero-gradient relative overflow-hidden pt-32 sm:pt-36 pb-20">
  <div class="absolute inset-0 dot-pattern opacity-30"></div>
  <div class="absolute -top-20 -right-32 w-96 h-96 rounded-full bg-orange-400/20 blur-3xl"></div>
  <div class="relative max-w-7xl mx-auto px-5 sm:px-8">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/15 backdrop-blur border border-white/30 text-white text-sm font-medium mb-5 fade-up">
      <i data-lucide="compass" class="w-4 h-4"></i>
      Field Trip · 場域踏查
    </div>
    <h1 class="fade-up text-white font-black tracking-tight text-4xl sm:text-5xl lg:text-6xl mb-4" x-text="page.page_title"></h1>
    <p class="fade-up text-cyan-100/90 text-base sm:text-lg max-w-2xl" x-html="md(page.page_description)"></p>
  </div>
  <div class="wave-divider absolute bottom-0 left-0 right-0">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path fill="#f8fafc" d="M0,32 C240,80 480,80 720,48 C960,16 1200,16 1440,48 L1440,80 L0,80 Z"></path>
    </svg>
  </div>
</section>

<!-- ============ INFO BAR ============ -->
<section class="pt-12">
  <div class="max-w-6xl mx-auto px-5 sm:px-8">
    <div class="grid sm:grid-cols-3 gap-4 fade-up">
      <div class="card !p-5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center shrink-0">
          <i data-lucide="map-pin" class="w-6 h-6 text-orange-600"></i>
        </div>
        <div>
          <div class="text-xs text-slate-500 uppercase tracking-wider">集合地點</div>
          <div class="font-bold text-ocean-deep" x-text="page.meeting_point"></div>
        </div>
      </div>
      <div class="card !p-5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center shrink-0">
          <i data-lucide="clock" class="w-6 h-6 text-amber-600"></i>
        </div>
        <div>
          <div class="text-xs text-slate-500 uppercase tracking-wider">活動時間</div>
          <div class="font-bold text-ocean-deep" x-text="page.duration"></div>
        </div>
      </div>
      <div class="card !p-5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-sky-100 flex items-center justify-center shrink-0">
          <i data-lucide="route" class="w-6 h-6 text-sky-600"></i>
        </div>
        <div>
          <div class="text-xs text-slate-500 uppercase tracking-wider">路線選擇</div>
          <div class="font-bold text-ocean-deep">
            <template x-for="(r, i) in (page.routes || [])" :key="i"><span x-text="(i > 0 ? ' / ' : '') + r.name"></span></template>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ============ ROUTES ============ -->
<template x-for="(r, i) in (page.routes || [])" :key="i">
  <section class="py-16 sm:py-20" :class="i % 2 === 1 ? 'bg-gradient-to-br from-sky-50 via-white to-cyan-50' : ''">
    <div class="max-w-6xl mx-auto px-5 sm:px-8">
      <div class="grid lg:grid-cols-12 gap-10 items-start">
        <!-- Left description -->
        <div class="lg:col-span-4 fade-up lg:sticky lg:top-24"
             :class="i % 2 === 1 ? 'lg:order-2' : ''">
          <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold tracking-wider uppercase mb-4"
               :class="routeTheme(i).badge_class">
            <i :data-lucide="routeTheme(i).icon" class="w-3.5 h-3.5"></i>
            路線<span x-text="['一','二','三','四'][i] || (i+1)"></span> · ROUTE <span x-text="i+1"></span>
          </div>
          <h2 class="text-4xl sm:text-5xl font-black text-ocean-deep mb-4 leading-tight">
            <span x-text="r.name"></span><br />
            <span class="text-2xl sm:text-3xl bg-gradient-to-r bg-clip-text text-transparent"
                  :class="routeTheme(i).title_grad" x-text="r.subtitle"></span>
          </h2>
          <div class="text-slate-600 leading-relaxed mb-6" x-html="md(r.description)"></div>
          <div class="flex flex-wrap gap-2 mb-6">
            <template x-for="(t, ti) in (r.tags || '').split(',').filter(x => x.trim())" :key="ti">
              <span :class="routeTheme(i).tag" x-text="t.trim()"></span>
            </template>
          </div>

          <!-- 費用提醒 -->
          <template x-if="r.fee_note">
            <div class="card !p-5 border-l-4 !border-l-amber-400 bg-amber-50/50">
              <div class="flex gap-3">
                <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-600 shrink-0 mt-0.5"></i>
                <div class="text-sm">
                  <div class="font-bold text-ocean-deep mb-1">費用與退費說明</div>
                  <p class="text-slate-700 leading-relaxed" x-html="md(r.fee_note)"></p>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Right timeline -->
        <div class="lg:col-span-8 fade-up"
             :class="i % 2 === 1 ? 'lg:order-1' : ''">
          <div class="card !p-7 sm:!p-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-40 h-40 rounded-full blur-2xl"
                 :class="routeTheme(i).blob"></div>

            <h3 class="font-bold text-ocean-deep text-lg mb-6 flex items-center gap-2 relative">
              <i data-lucide="map" class="w-5 h-5"></i> 行程站點
            </h3>

            <div class="relative">
              <div class="absolute left-[15px] top-2 bottom-2 w-0.5 bg-gradient-to-b"
                   :class="routeTheme(i).line_grad"></div>

              <ol class="space-y-5">
                <template x-for="(stop, si) in (r.stops || [])" :key="si">
                  <li class="relative pl-12">
                    <!-- Start marker -->
                    <template x-if="si === 0">
                      <div class="absolute left-0 top-0 w-8 h-8 rounded-full bg-gradient-to-br flex items-center justify-center text-white font-bold text-xs shadow-lg"
                           :class="routeTheme(i).start_grad">起</div>
                    </template>
                    <!-- End marker -->
                    <template x-if="si === r.stops.length - 1 && si !== 0">
                      <div class="absolute left-0 top-0 w-8 h-8 rounded-full bg-gradient-to-br flex items-center justify-center text-white font-bold text-xs shadow-lg"
                           :class="routeTheme(i).end_grad">終</div>
                    </template>
                    <!-- Middle marker -->
                    <template x-if="si > 0 && si < r.stops.length - 1">
                      <div class="absolute left-0 top-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs"
                           :class="routeTheme(i).middle_class" x-text="si"></div>
                    </template>
                    <div class="font-bold text-ocean-deep" x-text="stop.name"></div>
                    <div class="text-slate-500 text-sm" x-html="md(stop.description)" x-show="stop.description"></div>
                  </li>
                </template>
              </ol>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>

<!-- ============ CTA ============ -->
<section class="py-20">
  <div class="max-w-4xl mx-auto px-5 sm:px-8">
    <div class="card !p-10 text-center fade-up bg-gradient-to-br from-white via-orange-50 to-amber-50 border-orange-100">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-coral to-orange-500 mx-auto flex items-center justify-center mb-5 shadow-lg shadow-orange-500/30">
        <i data-lucide="compass" class="w-8 h-8 text-white"></i>
      </div>
      <h3 class="text-2xl sm:text-3xl font-black text-ocean-deep mb-3">名額有限，請及早報名</h3>
      <p class="text-slate-600 mb-6 leading-relaxed">
        場域踏查兩條路線均有人數限制，建議於完成大會報名時一併選擇路線。
      </p>
      <a :href="event.register_url || '../#register'" class="btn btn-primary">
        <i data-lucide="edit-3" class="w-5 h-5"></i> 前往報名
      </a>
    </div>
  </div>
</section>

<!-- ============ FOOTER ============ -->
<footer class="footer-bg text-white pt-16 pb-8">
  <div class="max-w-7xl mx-auto px-5 sm:px-8">
    <div class="grid md:grid-cols-3 gap-10 pb-12 border-b border-white/10">
      <div>
        <div class="flex items-center gap-2.5 mb-4">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-ocean-cyan to-ocean-teal flex items-center justify-center">
            <i data-lucide="waves" class="w-5 h-5 text-white"></i>
          </div>
          <div class="font-bold">
            <span x-text="event.title_main"></span><span x-text="event.title_suffix"></span>
          </div>
        </div>
        <p class="text-cyan-100/70 text-sm leading-relaxed">
          <span x-text="event.organizer_tag"></span><br />
          <span x-text="event.title_part1"></span> 暨 <span x-text="event.title_part2"></span>
        </p>
      </div>
      <div>
        <h4 class="font-bold mb-4 text-amber-200">快速連結</h4>
        <ul class="space-y-2.5 text-cyan-100/80 text-sm">
          <li><a href="../agenda/" class="hover:text-white transition">活動議程</a></li>
          <li><a href="../field-trip/" class="hover:text-white transition">場域踏查路線</a></li>
          <li><a href="../transport/" class="hover:text-white transition">交通與地圖</a></li>
          <li><a href="../contact/" class="hover:text-white transition">聯繫我們</a></li>
        </ul>
      </div>
      <div>
        <h4 class="font-bold mb-4 text-amber-200">聯絡資訊</h4>
        <ul class="space-y-2.5 text-cyan-100/80 text-sm">
          <li class="flex items-start gap-2"><i data-lucide="building-2" class="w-4 h-4 mt-0.5 shrink-0"></i><span x-html="md(event.footer?.org_name)"></span></li>
          <li class="flex items-start gap-2"><i data-lucide="phone" class="w-4 h-4 mt-0.5 shrink-0"></i><span x-text="event.footer?.phone"></span></li>
          <li class="flex items-start gap-2"><i data-lucide="map-pin" class="w-4 h-4 mt-0.5 shrink-0"></i><span x-text="event.footer?.address"></span></li>
        </ul>
      </div>
    </div>
    <div class="pt-6 text-center text-cyan-100/50 text-xs">
      © 2022 國立臺灣海洋大學 · National Taiwan Ocean University
    </div>
  </div>
</footer>

</body>
</html>
